name: Daily Market and Sentiment ETL

# 1. The Trigger
on:
  schedule:
    # Runs at 22:00 UTC (roughly after US markets close)
    - cron: '0 22 * * *' 
  workflow_dispatch: 
    # This magic line adds a "Run Workflow" button in the GitHub UI so you can test it manually right now!

# 2. The Environment
jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # 3. The Steps
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Change this to match your local version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Execute News ETL
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python backend/news_article.py

      - name: Execute Stock ETL
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python backend/stock.py